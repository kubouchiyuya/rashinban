name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: selfcheck
        run: python3 skills/rashinban/bin/rashinban selfcheck
      - name: smoke suite
        run: sh tests/smoke.sh
